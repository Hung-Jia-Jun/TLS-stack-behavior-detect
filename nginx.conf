worker_processes auto;

events {
    worker_connections 1024;
}

# 1. 定義白名單存儲空間
stream {
    lua_shared_dict whitelist 10m;

    server {
        listen 443;
        proxy_pass 127.0.0.1:8443;
        proxy_timeout 5s;  

        preread_by_lua_block {
            local ip = ngx.var.remote_addr
            local whitelist = ngx.shared.whitelist

            -- 1. 檢查白名單
            if whitelist:get(ip) then
                ngx.log(ngx.ERR, "--- [放行] 白名單 IP: ", ip, " ---")
                return 
            end

            -- 2. 讀取 ClientHello
            local sock = ngx.req.socket(true)
            local data, err = sock:receive(1024) 

            -- ========================================
            -- 三維深度行為指紋探測 (根據論文表 2.5-1)
            -- ========================================
            -- 探測包 A: Warning Alert (Content Type 0x15)
            --   格式: [ContentType=21] [Version=TLS1.2] [Length=2] [Level=Warning(1)] [Desc=100]
            local alert_payload = "\x15\x03\x03\x00\x02\x01\x64"

            -- 探測包 B: ChangeCipherSpec (Content Type 0x14)
            --   格式: [ContentType=20] [Version=TLS1.2] [Length=1] [CCS_Type=1]
            local ccs_payload = "\x14\x03\x03\x00\x01\x01"

            -- 探測包 C: Empty Application Data (Content Type 0x17)
            --   格式: [ContentType=23] [Version=TLS1.2] [Length=0]
            local appdata_payload = "\x17\x03\x03\x00\x00"

            -- 探測函數
            -- 論文建議: 探測包不宜發送過快，延遲以等待對方收到後再發送下一個
            local function probe(sock, payload, max_count)
                local count = 0
                for i = 1, max_count do
                    local bytes = sock:send(payload)
                    if not bytes then break end
                    count = count + 1
                    ngx.sleep(0.05) -- 50ms: 等待客戶端完整處理每個包
                end
                return count
            end

            -- 依序發送三種探測包 (增大數量以區分 Firefox 與 Golang)
            -- Firefox Alert=不限制，Golang Alert≈16+TCP buffer≈20
            -- 發送 50 個 Alert 就能清楚區分兩者
            local alert_score  = probe(sock, alert_payload, 50)

            -- [論文 2.1 節] 瀏覽器可能一次性開多個 TCP 連線，
            -- 並用 Close Notify 關閉到僅剩一個。
            -- 如果 Alert 得分極低 (<=3)，代表 socket 在探測開始前就已關閉，跳過。
            if alert_score <= 3 then
                ngx.log(ngx.ERR, string.format(
                    "--- [跳過] Socket 已關閉 (得分: %d)，不做指紋判定 ---", alert_score
                ))
                ngx.exit(ngx.OK)
            end

            -- [提前判定] Firefox/NSS: Alert 全部通過 (>=40)
            -- 此時 socket 仍然開啟，趁機發送 Close Notify 讓 Firefox 乾淨斷開
            if alert_score >= 40 then
                ngx.log(ngx.ERR, string.format(
                    "--- [指紋向量] IP: %s | Alert: %d | CCS: - | AppData: - | 總分: %d ---",
                    ip, alert_score, alert_score
                ))
                ngx.log(ngx.ERR, string.format(
                    "---  [指紋匹配] Firefox/NSS (Alert=inf) -> 放行 (Alert:%d) ---", alert_score
                ))
                whitelist:set(ip, true, 5)

                -- 趁 socket 還活著，主動發送 Fatal Close Notify
                local close_notify = "\x15\x03\x03\x00\x02\x02\x00"
                sock:send(close_notify)
                ngx.log(ngx.ERR, "--- [主動發送 Close Notify] Firefox 乾淨斷開 ---")
                ngx.exit(ngx.OK)
            end

            -- 非 Firefox: 繼續發送 CCS 和 AppData 探測
            local ccs_score    = probe(sock, ccs_payload, 35)
            local appdata_score = probe(sock, appdata_payload, 35)
            local total = alert_score + ccs_score + appdata_score

            -- 輸出三維指紋向量
            ngx.log(ngx.ERR, string.format(
                "--- [指紋向量] IP: %s | Alert: %d | CCS: %d | AppData: %d | 總分: %d ---",
                ip, alert_score, ccs_score, appdata_score, total
            ))

            -- ========================================
            -- 指紋匹配邏輯 (根據論文表 2.5-1)
            -- ========================================
            -- 論文理論值:
            --   BoringSSL (Chrome):  Alert=4,  CCS=32*, AppData=32*  (CCS+AppData 共享 32)
            --   NSS (Firefox):      Alert=inf,  CCS=1,   AppData=inf   (各自獨立)
            --   OpenSSL (curl):     Alert=4,  CCS=32*, AppData=32*  (CCS+AppData 共享 32)
            --   Golang:             Alert=16*, CCS=16*, AppData=16* (三者共享 16)
            --
            -- 實測結果 (依序發送 50+35+35):
            --   Chrome:  alert≈9,  ccs≈0,  appdata≈0  (Alert 崩潰後連線中斷)
            --   Firefox: alert=50, ccs≈1,  appdata≈? (Alert 不限制，全部通過)
            --   curl:    alert≈4,  ccs≈0,  appdata≈0  (Alert 極快崩潰)
            --   Go(16):  alert≈20, ccs≈1,  appdata≈0  (共享計數器≈16+TCP buffer=client 關閉連線)

            local identity = "Unknown"

            -- 預設全部通過
            local action = "pass"

            -- 規則 1: Firefox/NSS 特徵 (Alert 全部通過 >=40，CCS 極低)
            -- Firefox Alert=不限制，50 個全部通過
            -- CCS 論文值=1，但 TCP 緩衝區讓實測值達到 ~5
            if alert_score >= 40 and ccs_score <= 8 then
                identity = "Firefox/NSS (Alert=inf, CCS=1)"
                action = "pass"

            -- 規則 2: Chrome/BoringSSL 特徵 (Alert 在 8-14 崩潰)
            elseif alert_score >= 8 and alert_score <= 14 then
                identity = "Chrome/BoringSSL"
                action = "pass"

            -- 規則 3: 標準 Golang 特徵 (Alert ≈16-30，共享計數器耗盡)
            -- 關鍵區分: Go 的 Alert 在 ~20 處崩潰，遠低於 Firefox 的 50
            elseif alert_score >= 15 and alert_score <= 35 then
                identity = "Golang (MaxUselessRecords=16)"
                action = "block"

            -- 規則 4: curl/k6/OpenSSL 特徵 (Alert 極低 <=7)
            elseif alert_score <= 7 then
                identity = "curl/k6/OpenSSL"
                action = "block"
            end

            if action == "pass" then
                ngx.log(ngx.ERR, string.format(
                    "---  [指紋匹配] %s -> 放行 (Alert:%d CCS:%d AppData:%d) ---",
                    identity, alert_score, ccs_score, appdata_score
                ))
                whitelist:set(ip, true, 5)
            else
                ngx.log(ngx.ERR, string.format(
                    "---  [攔截] %s -> 封鎖 (Alert:%d CCS:%d AppData:%d) ---",
                    identity, alert_score, ccs_score, appdata_score
                ))
            end

            -- 主動發送 Fatal Alert (Close Notify) 通知客戶端斷開
            -- 格式: [ContentType=Alert(21)] [Version=TLS1.2] [Length=2] [Level=Fatal(2)] [Desc=CloseNotify(0)]
            -- \x15\x03\x03\x00\x02\x02\x00
            -- │    │         │    │    └─ Description: Close Notify (0)
            -- │    │         │    └────── Level: Fatal (2)
            -- │    │         └─────────── Length: 2
            -- │    └───────────────────── Version: TLS 1.2
            -- └────────────────────────── Content Type: Alert (21)

            local close_notify = "\x15\x03\x03\x00\x02\x02\x00"
            sock:send(close_notify)
            ngx.log(ngx.ERR, "--- [主動發送 Close Notify] ---")
            ngx.exit(ngx.OK)
        }
    }
}

# 2. 正常的 HTTP 業務層
http {
    server {
        listen 8443 ssl;
        ssl_certificate     /tmp/papers/nginx/server.crt;
        ssl_certificate_key /tmp/papers/nginx/server.key;

        location / {
            content_by_lua_block {
                ngx.say("OK")
            }
        }
    }
}